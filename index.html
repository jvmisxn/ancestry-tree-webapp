<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JMO Ancestry</title>
    <link rel="stylesheet" href="./src/styles.css?v=diagonal-ancestor-lanes-1" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar" aria-label="Family tree controls">
        <div class="brand-block">
          <p class="eyebrow">JMO</p>
          <h1>Ancestry</h1>
        </div>

        <label class="search">
          <span>Find a person</span>
          <input id="person-search" type="search" placeholder="Search names, places, notes" autocomplete="off" />
        </label>

        <div class="toolbar" aria-label="Tree actions">
          <button id="load-json" type="button" title="Load private family data">Load data</button>
          <input id="import-json" class="file-input" type="file" accept="application/json,.json" />
          <button id="export-json" type="button" title="Download family data">Export data</button>
        </div>

        <div id="data-status" class="data-status" role="status"></div>

        <section class="panel">
          <h2>People</h2>
          <div id="person-list" class="person-list"></div>
        </section>
      </aside>

      <section class="tree-area" aria-label="Family tree visualization">
        <div class="tree-header">
          <div>
            <p class="eyebrow">Tree focused on</p>
            <h2 id="tree-title">Loading family tree...</h2>
          </div>
          <div class="tree-tools">
            <div class="tree-summary">
              <div id="tree-count" class="tree-count"></div>
              <div class="legend" aria-label="Tree legend">
                <span><i class="legend-swatch direct"></i>Direct line</span>
                <span><i class="legend-swatch collateral"></i>Collateral</span>
              </div>
            </div>
            <div class="view-actions" aria-label="View panels">
              <button id="focus-direct" type="button" title="Show every connected relative around this family">Show full tree</button>
              <button id="fit-tree" type="button" title="Fit tree to view">Fit view</button>
              <button id="toggle-people" type="button" aria-pressed="false">People</button>
              <button id="toggle-profile" type="button" aria-pressed="false">Profile</button>
            </div>
          </div>
        </div>
        <div id="tree-viewport" class="tree-viewport">
          <svg id="tree-svg" role="img" aria-label="Interactive family tree"></svg>
        </div>
      </section>

      <aside class="details" aria-label="Selected person details">
        <button id="close-profile" class="window-close" type="button" title="Close profile">Close</button>
        <section class="panel person-card">
          <p class="eyebrow">Profile</p>
          <h2 id="detail-name">Select someone</h2>
          <div class="profile-actions">
            <button id="center-person" type="button">Make tree focus</button>
            <button id="home-person" type="button">Return to start</button>
          </div>
          <dl id="detail-facts"></dl>
          <div id="detail-notes" class="notes"></div>
        </section>

        <section class="panel">
          <h2>Relationships</h2>
          <div id="detail-relations" class="relation-list"></div>
        </section>

        <section class="panel">
          <h2>Sources</h2>
          <div id="detail-sources" class="source-list"></div>
        </section>
      </aside>
    </main>

    <script type="module" src="./src/app.js?v=diagonal-ancestor-lanes-1"></script>
  </body>
</html>
